name: Aikido Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run weekly security scans (every Monday at 9 AM UTC)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggers

jobs:
  security-scan:
    name: Aikido Security Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Run Aikido Security Scan
        uses: aikidosec/github-actions-scan@v1
        with:
          # Get your API token from Aikido dashboard
          api-token: ${{ secrets.AIKIDO_API_TOKEN }}

          # Fail on critical vulnerabilities
          fail-on-critical: true

          # Fail on high vulnerabilities (optional)
          fail-on-high: false

          # Include dependency scanning
          scan-dependencies: true

          # Include SAST scanning
          scan-sast: true

          # Include secrets scanning
          scan-secrets: true

          # Upload results as SARIF
          sarif-file: aikido-results.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: aikido-results.sarif
          category: aikido-security

      - name: Generate security report
        if: always()
        run: |
          echo "## 🛡️ Aikido Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Check the Security tab for detailed findings" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🛡️ Aikido Security Scan\n\n';
            comment += 'Security scan completed. ';
            comment += 'Check the Security tab for detailed findings.\n\n';
            comment += '_Scan timestamp: ' + new Date().toISOString() + '_';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
